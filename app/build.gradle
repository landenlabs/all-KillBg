// All-KillBg
// module build.gradle

plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace = "com.landenlabs.all_killbg"
    compileSdk = 35

    defaultConfig {
        applicationId = "com.landenlabs.all_killbg"
        minSdk = 21
        targetSdk = 35

        versionCode = 60419
        versionName = '6.04.19' // 2026 April(04) 19th
        // Restore the versionName resource for layouts
        resValue "string", "versionName", "v" + versionName

        // Limit languages to following list.
        resConfigs("en", "es")

        buildConfigField("long", "BuildTimeMilli", "${System.currentTimeMillis()}L")
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(17)
        }
    }

    buildFeatures {
        buildConfig = true
        resValues = true
    }

    buildTypes {
        release {
            minifyEnabled = true
            proguardFiles(getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro')

            ndk {
                abiFilters("armeabi-v7a", "arm64-v8a")
            }
        }
    }

    lint {
        abortOnError = false
        disable += [
            'DefaultLocale', 'SimpleDateFormat', 'InflateParams', 'SpUsage',
            'UseCompoundDrawables', 'HandlerLeak', 'ViewConstructor', 'SetTextI18n',
            'RtlSymmetry', 'RtlHardcoded', 'ContentDescription',
            'MissingTranslation', 'ValidFragment', 'UnusedAttribute',
            'FieldCanBeLocal', 'LocalSuppress', 'HardcodedText', 'Typos'
        ]
    }

    tasks.withType(JavaCompile).configureEach {
        // Enable verbose lint reporting during build.
        options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
    }
}

dependencies {
    implementation(libs.androidx.appcompat)
    implementation(libs.androidx.recyclerview)
    implementation(libs.androidx.preference)
    implementation(libs.android.processes)
}

// Rename app - Fixed for AGP 9.x using androidComponents
androidComponents {
    onVariants(selector().all(), { variant ->
        variant.outputs.forEach { output ->
            def ourName = project.parent.name
            def buildType = variant.buildType
            def versionStr = variant.outputs[0].versionName.get().replaceAll("-.*", "")
            def flavor = variant.flavorName ?: ""
            def newNameRoot = "${ourName}${flavor}-${buildType}-${versionStr}"
            output.outputFileName.set("${newNameRoot}.apk")
        }
    })
}